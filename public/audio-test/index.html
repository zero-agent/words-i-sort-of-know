<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faust Instrument Test</title>
<style>
  body { font-family: monospace; background: #1a1a1e; color: #ccc; padding: 20px; }
  button { background: #333; border: 1px solid #555; color: #ddd; padding: 8px 16px; margin: 4px; cursor: pointer; border-radius: 4px; font-size: 14px; }
  button:hover { background: #444; }
  button.active { background: #4fc3f7; color: #000; }
  .controls { margin: 16px 0; }
  label { margin-right: 12px; display: inline-block; }
  input[type=range] { vertical-align: middle; width: 140px; }
  #log { background: #111; padding: 12px; border-radius: 4px; height: 200px; overflow-y: auto; font-size: 12px; margin-top: 16px; }
  .note-row { display: flex; gap: 4px; flex-wrap: wrap; margin: 8px 0; }
  .note-row button { min-width: 44px; }
  h2 { color: #4fc3f7; margin-top: 24px; }
  .instrument-select button.selected { background: #4fc3f7; color: #000; }
</style>
</head>
<body>
<h1>🎻 Faust Instrument Test</h1>

<div class="controls">
  <button id="btn-init" class="active">Initialize Audio</button>
  <span id="status">Not initialized</span>
</div>

<h2>Instrument</h2>
<div class="instrument-select">
  <button id="sel-string" class="selected">Plucked String</button>
  <button id="sel-violin">Violin (Physical Model)</button>
</div>

<h2>Controls</h2>
<div class="controls">
  <label>Gain: <input type="range" id="gain" min="0" max="1" step="0.01" value="0.5"> <span id="gain-val">0.5</span></label>
  <label>Damping: <input type="range" id="damping" min="0" max="0.99" step="0.01" value="0.4"> <span id="damping-val">0.4</span></label><br>
  <label>Bow Pressure: <input type="range" id="bowPressure" min="0" max="1" step="0.01" value="0.5"> <span id="bowPressure-val">0.5</span></label>
  <label>Bow Position: <input type="range" id="bowPosition" min="0" max="1" step="0.01" value="0.7"> <span id="bowPosition-val">0.7</span></label><br>
  <label>Vibrato: <input type="range" id="vibratoGain" min="0" max="1" step="0.01" value="0.3"> <span id="vibratoGain-val">0.3</span></label>
</div>

<h2>Play Notes</h2>
<div class="note-row" id="notes-low"></div>
<div class="note-row" id="notes-high"></div>

<h2>Sustain</h2>
<div class="controls">
  <button id="btn-sustain-on">Gate ON (bow)</button>
  <button id="btn-sustain-off">Gate OFF</button>
  <label>Freq: <input type="range" id="sustain-freq" min="50" max="800" step="1" value="104"> <span id="sustain-freq-val">104 Hz (G#2)</span></label>
</div>

<h2>Sequences</h2>
<button id="btn-arpeggio">Arpeggio</button>
<button id="btn-melody">Inference.1 Motif</button>
<button id="btn-sustained-melody">Sustained Melody</button>

<div id="log"></div>

<script type="module">
import { FaustMonoDspGenerator, FaustWasmInstantiator } from './faustwasm-runtime.js';

const log = (msg) => {
  const el = document.getElementById('log');
  el.innerHTML += `<div>${new Date().toLocaleTimeString()} ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
};

let audioCtx = null;
let masterGain = null;
let currentNode = null;
let currentInstrument = 'string'; // 'string' or 'violin'
let instruments = {}; // cached nodes

const SCALE = [
  { name: 'G#2', freq: 103.83 }, { name: 'A#2', freq: 116.54 },
  { name: 'B2',  freq: 123.47 }, { name: 'C#3', freq: 138.59 },
  { name: 'D#3', freq: 155.56 }, { name: 'E3',  freq: 164.81 },
  { name: 'F#3', freq: 185.00 }, { name: 'G#3', freq: 207.65 },
  { name: 'A#3', freq: 233.08 }, { name: 'B3',  freq: 246.94 },
  { name: 'C#4', freq: 277.18 }, { name: 'D#4', freq: 311.13 },
  { name: 'E4',  freq: 329.63 }, { name: 'F#4', freq: 369.99 },
  { name: 'G#4', freq: 415.30 },
];

const lowRow = document.getElementById('notes-low');
const highRow = document.getElementById('notes-high');
SCALE.forEach((note, i) => {
  const btn = document.createElement('button');
  btn.textContent = note.name;
  btn.addEventListener('click', () => playNote(note.freq));
  (i < 8 ? lowRow : highRow).appendChild(btn);
});

async function loadInstrument(name, wasmPath, jsonPath) {
  log(`Loading ${name}...`);
  const factory = await FaustWasmInstantiator.loadDSPFactory(wasmPath, jsonPath);
  const generator = new FaustMonoDspGenerator();
  generator.factory = factory;
  generator.name = name;
  const node = await generator.createNode(audioCtx, name);
  node.connect(masterGain);
  instruments[name] = node;
  log(`${name} loaded ✓`);
  return node;
}

async function init() {
  log('Initializing AudioContext...');
  audioCtx = new AudioContext();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.8;
  masterGain.connect(audioCtx.destination);

  try {
    await loadInstrument('string', '../vl/faust/wasm/string.wasm', '../vl/faust/wasm/string.json');
    await loadInstrument('violin', '../vl/faust/wasm/violin.wasm', '../vl/faust/wasm/violin.json');
    currentNode = instruments['string'];
    document.getElementById('status').textContent = '✓ Ready';
    document.getElementById('btn-init').classList.remove('active');
    log('Both instruments loaded — ready!');
  } catch(e) {
    log(`ERROR: ${e.message}`);
    console.error(e);
  }
}

function switchInstrument(name) {
  if (!instruments[name]) { log(`${name} not loaded`); return; }
  // Gate off current
  if (currentNode) {
    try { currentNode.setParamValue(`/${currentInstrument}/gate`, 0); } catch(e) {}
  }
  currentInstrument = name;
  currentNode = instruments[name];
  document.querySelectorAll('.instrument-select button').forEach(b => b.classList.remove('selected'));
  document.getElementById(name === 'string' ? 'sel-string' : 'sel-violin').classList.add('selected');
  log(`Switched to ${name}`);
}

// Param path mapping per instrument
const paramPaths = {
  string: {
    freq: '/string/freq', gain: '/string/gain', gate: '/string/gate',
    damping: '/string/damping', bowPressure: '/string/bowPressure',
  },
  violin: {
    freq: '/violin/violin/midi/freq', gain: '/violin/violin/otherParams/outGain',
    gate: '/violin/violin/gate',
    bowPressure: '/violin/violin/bow/pressure', bowPosition: '/violin/violin/bow/position',
    vibratoGain: '/violin/violin/otherParams/vibratoGain',
    brightness: '/violin/body/brightness',
  }
};

function setParam(name, value) {
  if (!currentNode) return;
  const path = paramPaths[currentInstrument]?.[name];
  if (path) {
    try { currentNode.setParamValue(path, value); } catch(e) { console.warn('setParam fail:', path, e); }
  }
}

function playNote(freq) {
  if (!currentNode) { log('Not initialized!'); return; }
  setParam('freq', freq);
  setParam('gain', parseFloat(document.getElementById('gain').value));
  setParam('damping', parseFloat(document.getElementById('damping').value));
  setParam('bowPressure', parseFloat(document.getElementById('bowPressure').value));
  setParam('bowPosition', parseFloat(document.getElementById('bowPosition').value));
  setParam('vibratoGain', parseFloat(document.getElementById('vibratoGain').value));
  setParam('brightness', parseFloat(document.getElementById('vibratoGain').value));
  setParam('gate', 1);
  setTimeout(() => setParam('gate', 0), 80);
  log(`♪ ${freq.toFixed(1)} Hz [${currentInstrument}]`);
}

function sustainOn(freq) {
  if (!currentNode) { log('Not initialized!'); return; }
  setParam('freq', freq);
  setParam('gain', parseFloat(document.getElementById('gain').value));
  setParam('damping', parseFloat(document.getElementById('damping').value));
  setParam('bowPressure', parseFloat(document.getElementById('bowPressure').value));
  setParam('bowPosition', parseFloat(document.getElementById('bowPosition').value));
  setParam('vibratoGain', parseFloat(document.getElementById('vibratoGain').value));
  setParam('brightness', parseFloat(document.getElementById('vibratoGain').value));
  setParam('gate', 1);
  log(`🎻 Sustain ON — ${freq.toFixed(1)} Hz [${currentInstrument}]`);
}

document.getElementById('btn-init').addEventListener('click', init);
document.getElementById('sel-string').addEventListener('click', () => switchInstrument('string'));
document.getElementById('sel-violin').addEventListener('click', () => switchInstrument('violin'));

// Sliders
['gain', 'damping', 'bowPressure', 'bowPosition', 'vibratoGain'].forEach(id => {
  document.getElementById(id).addEventListener('input', (e) => {
    document.getElementById(id + '-val').textContent = e.target.value;
    setParam(id, parseFloat(e.target.value));
  });
});

// Sustain
document.getElementById('btn-sustain-on').addEventListener('click', () => {
  sustainOn(parseFloat(document.getElementById('sustain-freq').value));
});
document.getElementById('btn-sustain-off').addEventListener('click', () => {
  setParam('gate', 0);
  log('🎻 Sustain OFF');
});
document.getElementById('sustain-freq').addEventListener('input', (e) => {
  const freq = parseFloat(e.target.value);
  const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const midi = Math.round(12 * Math.log2(freq / 440) + 69);
  const name = names[midi % 12] + Math.floor(midi / 12 - 1);
  document.getElementById('sustain-freq-val').textContent = `${freq} Hz (${name})`;
  setParam('freq', freq);
});

// Sequences
document.getElementById('btn-arpeggio').addEventListener('click', () => {
  const notes = [103.83, 155.56, 207.65, 311.13, 207.65, 155.56, 103.83];
  notes.forEach((f, i) => setTimeout(() => playNote(f), i * 250));
});

document.getElementById('btn-melody').addEventListener('click', () => {
  const notes = [207.65, 155.56, 246.94, 207.65, 155.56, 123.47, 103.83];
  notes.forEach((f, i) => setTimeout(() => playNote(f), i * 300));
});

document.getElementById('btn-sustained-melody').addEventListener('click', () => {
  if (!currentNode) { log('Not initialized!'); return; }
  const melody = [
    { freq: 207.65, dur: 800 }, { freq: 155.56, dur: 600 },
    { freq: 246.94, dur: 1000 }, { freq: 207.65, dur: 600 },
    { freq: 155.56, dur: 400 }, { freq: 123.47, dur: 800 },
    { freq: 103.83, dur: 1200 },
  ];
  let t = 0;
  melody.forEach((note) => {
    setTimeout(() => sustainOn(note.freq), t);
    setTimeout(() => setParam('gate', 0), t + note.dur - 50);
    t += note.dur;
  });
});
</script>
</body>
</html>
