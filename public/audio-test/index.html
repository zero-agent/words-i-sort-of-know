<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faust Instrument Test</title>
<style>
  body { font-family: monospace; background: #1a1a1e; color: #ccc; padding: 20px; }
  button { background: #333; border: 1px solid #555; color: #ddd; padding: 8px 16px; margin: 4px; cursor: pointer; border-radius: 4px; font-size: 14px; }
  button:hover { background: #444; }
  button.active { background: #4fc3f7; color: #000; }
  .controls { margin: 16px 0; }
  label { margin-right: 12px; }
  input[type=range] { vertical-align: middle; }
  #log { background: #111; padding: 12px; border-radius: 4px; height: 200px; overflow-y: auto; font-size: 12px; margin-top: 16px; }
  .note-row { display: flex; gap: 4px; flex-wrap: wrap; margin: 8px 0; }
  .note-row button { min-width: 44px; }
  h2 { color: #4fc3f7; margin-top: 24px; }
</style>
</head>
<body>
<h1>🎻 Faust Instrument Test</h1>
<p>Pre-compiled Karplus-Strong string model</p>

<div class="controls">
  <button id="btn-init" class="active">Initialize Audio</button>
  <span id="status">Not initialized</span>
</div>

<h2>Play Notes</h2>
<div class="controls">
  <label>Gain: <input type="range" id="gain" min="0" max="1" step="0.01" value="0.5"> <span id="gain-val">0.5</span></label>
  <label>Damping: <input type="range" id="damping" min="0" max="0.99" step="0.01" value="0.4"> <span id="damping-val">0.4</span></label>
</div>

<div class="note-row" id="notes-low">
  <!-- G# minor scale octave 2-3 -->
</div>
<div class="note-row" id="notes-high">
  <!-- G# minor scale octave 3-4 -->
</div>

<h2>Sequence Test</h2>
<button id="btn-arpeggio">G# Minor Arpeggio</button>
<button id="btn-melody">Inference.1 Motif</button>
<button id="btn-staccato">Staccato Pattern</button>

<div id="log"></div>

<script type="module">
import { FaustMonoDspGenerator, FaustBaseWebAudioDsp } from './faustwasm-runtime.js';

const log = (msg) => {
  const el = document.getElementById('log');
  el.innerHTML += `<div>${new Date().toLocaleTimeString()} ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
};

let audioCtx = null;
let stringNode = null;
let masterGain = null;

// G# minor: G#, A#, B, C#, D#, E, F#
const SCALE = [
  { name: 'G#2', midi: 44, freq: 103.83 },
  { name: 'A#2', midi: 46, freq: 116.54 },
  { name: 'B2',  midi: 47, freq: 123.47 },
  { name: 'C#3', midi: 49, freq: 138.59 },
  { name: 'D#3', midi: 51, freq: 155.56 },
  { name: 'E3',  midi: 52, freq: 164.81 },
  { name: 'F#3', midi: 54, freq: 185.00 },
  { name: 'G#3', midi: 56, freq: 207.65 },
  { name: 'A#3', midi: 58, freq: 233.08 },
  { name: 'B3',  midi: 59, freq: 246.94 },
  { name: 'C#4', midi: 61, freq: 277.18 },
  { name: 'D#4', midi: 63, freq: 311.13 },
  { name: 'E4',  midi: 64, freq: 329.63 },
  { name: 'F#4', midi: 66, freq: 369.99 },
  { name: 'G#4', midi: 68, freq: 415.30 },
];

// Build note buttons
const lowRow = document.getElementById('notes-low');
const highRow = document.getElementById('notes-high');
SCALE.forEach((note, i) => {
  const btn = document.createElement('button');
  btn.textContent = note.name;
  btn.addEventListener('click', () => playNote(note.freq));
  (i < 8 ? lowRow : highRow).appendChild(btn);
});

async function init() {
  log('Initializing AudioContext...');
  audioCtx = new AudioContext();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.8;
  masterGain.connect(audioCtx.destination);

  log('Loading Faust string instrument...');

  try {
    // Load the pre-compiled factory
    const factory = await FaustMonoDspGenerator.loadDSPFactory(
      '../vl/faust/wasm/string.wasm',
      '../vl/faust/wasm/string.json'
    );
    log(`Factory loaded: ${factory.json ? 'OK' : 'FAIL'}`);

    // Create generator and node
    const generator = new FaustMonoDspGenerator();
    generator.factory = factory;
    generator.name = 'string';

    stringNode = await generator.createNode(audioCtx, 'string');
    stringNode.connect(masterGain);

    log(`String node created! Outputs: ${stringNode.numberOfOutputs}`);
    log('Ready — click a note to play');
    document.getElementById('status').textContent = '✓ Ready';
    document.getElementById('btn-init').classList.remove('active');
  } catch(e) {
    log(`ERROR: ${e.message}`);
    console.error(e);
  }
}

function playNote(freq, gain, damping) {
  if (!stringNode) { log('Not initialized!'); return; }
  const g = gain ?? parseFloat(document.getElementById('gain').value);
  const d = damping ?? parseFloat(document.getElementById('damping').value);

  stringNode.setParamValue('/string/freq', freq);
  stringNode.setParamValue('/string/gain', g);
  stringNode.setParamValue('/string/damping', d);
  stringNode.setParamValue('/string/gate', 1);
  setTimeout(() => stringNode.setParamValue('/string/gate', 0), 30);

  log(`♪ ${freq.toFixed(1)} Hz  gain=${g}  damping=${d}`);
}

// Sequence helpers
function playSequence(notes, intervalMs = 200) {
  notes.forEach((note, i) => {
    setTimeout(() => playNote(note.freq, note.gain, note.damping), i * intervalMs);
  });
}

document.getElementById('btn-init').addEventListener('click', init);

document.getElementById('gain').addEventListener('input', (e) => {
  document.getElementById('gain-val').textContent = e.target.value;
});
document.getElementById('damping').addEventListener('input', (e) => {
  document.getElementById('damping-val').textContent = e.target.value;
});

// Sequence buttons
document.getElementById('btn-arpeggio').addEventListener('click', () => {
  playSequence([
    { freq: 103.83 }, { freq: 155.56 }, { freq: 207.65 },
    { freq: 311.13 }, { freq: 207.65 }, { freq: 155.56 },
    { freq: 103.83 },
  ], 250);
});

document.getElementById('btn-melody').addEventListener('click', () => {
  // Inference.1 main motif: G#-D#-B descending
  playSequence([
    { freq: 207.65 }, { freq: 155.56 }, { freq: 246.94 },
    { freq: 207.65 }, { freq: 155.56 }, { freq: 123.47 },
    { freq: 103.83 },
  ], 300);
});

document.getElementById('btn-staccato').addEventListener('click', () => {
  // Staccato pattern from the awake section
  const g1 = { freq: 103.83, gain: 0.7, damping: 0.6 };
  const d3 = { freq: 155.56, gain: 0.5, damping: 0.5 };
  playSequence([g1, d3, d3, g1, d3, d3, g1, g1, d3, g1, g1, d3], 150);
});
</script>
</body>
</html>
