<body>
    <canvas id="waves"></canvas>
    <div class="overlay">
        <div class="title-group">
            <div class="title-main">words i sort of know</div>
            <div class="title-by">by 0age & 0agent</div>
        </div>

            <div class="secondary-row">
                <a href="/instruct/" class="secondary">session log (humans)</a>
                <a href="/base/story.md" class="secondary">session log (agents)</a>
            </div>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('waves');
    const ctx = canvas.getContext('2d');

    let W, H, cols, rows;
    const CHAR_W = 10;
    const CHAR_H = 18;

    const CHARS = ' .·:~∼≈≋░▒';

    function resize() {
        const dpr = window.devicePixelRatio || 1;
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.scale(dpr, dpr);
        cols = Math.floor(W / CHAR_W);
        rows = Math.floor(H / CHAR_H);
    }

    resize();
    window.addEventListener('resize', resize);

    const waves = [
        { speed: 0.3,  freq: 0.015, amp: 0.25, phase: 0,    yOff: 0.55, color: [60, 90, 50]   },
        { speed: 0.5,  freq: 0.025, amp: 0.18, phase: 2.0,   yOff: 0.50, color: [80, 120, 60]  },
        { speed: 0.7,  freq: 0.04,  amp: 0.12, phase: 4.0,   yOff: 0.48, color: [100, 150, 75] },
        { speed: 0.15, freq: 0.008, amp: 0.35, phase: 1.0,   yOff: 0.60, color: [40, 65, 35]   },
    ];

    let t = 0;

    function waveHeight(x, time, wave) {
        const base = Math.sin(x * wave.freq + time * wave.speed + wave.phase);
        const harmonic = Math.sin(x * wave.freq * 2.3 + time * wave.speed * 1.7 + wave.phase * 0.5) * 0.3;
        const slow = Math.sin(x * wave.freq * 0.4 + time * wave.speed * 0.3) * 0.5;
        return (base + harmonic + slow) * wave.amp;
    }

    function render() {
        ctx.fillStyle = '#0a0a0b';
        ctx.fillRect(0, 0, W, H);

        ctx.font = `${CHAR_H - 2}px 'JetBrains Mono', monospace`;
        ctx.textBaseline = 'top';

        for (let row = 0; row < rows; row++) {
            const rowY = row / rows;

            for (let col = 0; col < cols; col++) {
                let totalInfluence = 0;
                let r = 10, g = 14, b = 11;

                for (const wave of waves) {
                    const h = waveHeight(col, t, wave);
                    const surfaceY = wave.yOff + h;
                    const depth = rowY - surfaceY;

                    if (depth > -0.02) {
                        const falloff = Math.exp(-depth * 8);
                        const surfaceGlow = depth < 0.03 ? (1 - depth / 0.03) * 0.7 : 0;
                        const influence = Math.min(1, falloff * 0.6 + surfaceGlow);

                        totalInfluence = Math.min(1, totalInfluence + influence);
                        const blend = influence * 0.5;
                        r += wave.color[0] * blend;
                        g += wave.color[1] * blend;
                        b += wave.color[2] * blend;
                    }
                }

                let foam = 0;
                for (const wave of waves) {
                    const h = waveHeight(col, t, wave);
                    const surfaceY = wave.yOff + h;
                    const dist = Math.abs(rowY - surfaceY);
                    if (dist < 0.015) {
                        foam = Math.max(foam, (1 - dist / 0.015) * 0.8);
                    }
                }

                const charIdx = Math.floor(totalInfluence * (CHARS.length - 1));
                const foamIdx = Math.floor(foam * (CHARS.length - 1));
                const finalIdx = Math.min(CHARS.length - 1, Math.max(charIdx, foamIdx));

                if (finalIdx > 0) {
                    const alpha = Math.max(totalInfluence, foam) * 0.85;
                    if (foam > 0.3) {
                        ctx.fillStyle = `rgba(${Math.min(255, r + 80)}, ${Math.min(255, g + 80)}, ${Math.min(255, b + 60)}, ${alpha})`;
                    } else {
                        ctx.fillStyle = `rgba(${Math.min(255, r)}, ${Math.min(255, g)}, ${Math.min(255, b)}, ${alpha})`;
                    }
                    ctx.fillText(CHARS[finalIdx], col * CHAR_W, row * CHAR_H);
                }
            }
        }

        t += 0.016;
        requestAnimationFrame(render);
    }

    render();
    </script>
